name: Bug report / 反馈问题
description: Something feels broken? Tell us here. / 用着哪里不对，随手反馈一下
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying Better DeepSeek.
        No need to fill everything perfectly. A screenshot or a few words is already helpful.

        感谢你试用 Better DeepSeek。
        不用写得很正式，几句话或一张截图也很有帮助。
  - type: textarea
    id: summary
    attributes:
      label: What happened? / 发生了什么？
      placeholder: |
        Example: The folder button disappeared after refreshing DeepSeek.

        例如：刷新 DeepSeek 后文件夹按钮不见了。
  - type: textarea
    id: steps
    attributes:
      label: How did you run into it? / 大概怎么遇到的？
      placeholder: |
        1. Open DeepSeek
        2. Click ...
        3. Something looks wrong

        1. 打开 DeepSeek
        2. 点击 ...
        3. 这里看起来不对
  - type: textarea
    id: expected
    attributes:
      label: What did you expect? / 你原本期望怎样？
      placeholder: |
        Tell us what you expected to see.

        简单说说你原本希望它怎么工作。
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings / 截图或录屏
      description: Drag images here if you have any. / 有的话可以直接拖进来。
  - type: input
    id: browser
    attributes:
      label: Browser / 浏览器
      placeholder: Chrome, Edge, Arc...
  - type: input
    id: version
    attributes:
      label: Version / 版本
      placeholder: v0.1.0, latest main, or not sure / v0.1.0、最新版、或不确定
  - type: textarea
    id: extra
    attributes:
      label: Anything else? / 其他补充
      placeholder: |
        Any extra details are welcome.

        还有什么想补充的都可以写这里。
