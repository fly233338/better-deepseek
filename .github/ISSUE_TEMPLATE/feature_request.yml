name: Feature request / 功能建议
description: Got an idea for Better DeepSeek? / 有想法就写在这里
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Rough ideas are welcome. We can polish the details together later.

        感谢分享想法。
        想法还不完整也没关系，可以先记下来，后面一起补细节。
  - type: textarea
    id: idea
    attributes:
      label: What do you want? / 你想要什么功能？
      placeholder: |
        Example: I want folders to support icons.

        例如：希望文件夹可以设置图标。
  - type: textarea
    id: why
    attributes:
      label: Why would it help? / 它能解决什么问题？
      placeholder: |
        Tell us when you would use it.

        简单说说你会在什么场景用到它。
  - type: dropdown
    id: area
    attributes:
      label: Related area / 大概属于哪里？
      options:
        - Not sure / 不确定
        - Folders / 文件夹
        - Prompt library / 提示词库
        - Quote reply / 引用回复
        - Table copy / 表格复制
        - Popup or settings / Popup 或设置
        - Import/export / 导入导出
        - Other / 其他
  - type: textarea
    id: examples
    attributes:
      label: Examples, screenshots, or links / 示例、截图或链接
      placeholder: |
        If another tool does this well, drop a link or screenshot.

        如果别的工具有类似功能，可以贴链接或截图。
  - type: textarea
    id: extra
    attributes:
      label: Anything else? / 其他补充
      placeholder: |
        Add anything else here.

        其他想法写这里就好。
